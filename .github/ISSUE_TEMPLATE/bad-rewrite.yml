name: Bad rewrite
description: Report a Youish output that changed meaning, flattened voice, invented details, or missed the point.
title: "Bad rewrite: "
labels: ["bad rewrite", "needs regression"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Youish sharper. Please remove private names, secrets, customer data, medical/legal details, and anything you do not want public.
        For the safest report, run `python3 scripts/failure_fixture.py` or `python3 scripts/redact_case.py` locally and paste the tool-redacted public fixture candidate.
  - type: dropdown
    id: failure_type
    attributes:
      label: Failure type
      options:
        - Changed meaning
        - Invented fact or claim
        - Flattened voice
        - Too verbose
        - Too formal or cheerful
        - Added wrapper, note, or rationale
        - Asked an unnecessary clarifying question
        - Missed the throughline
        - Violated a hard constraint
        - Other
    validations:
      required: true
  - type: dropdown
    id: prompt_mode
    attributes:
      label: Prompt mode
      description: How was Youish used?
      options:
        - Source-only messy notes
        - Explicit rewrite/edit request
        - Voice profile
        - Comparison/report
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: precision_context
    attributes:
      label: Precision context
      description: Does this involve claims where factual drift matters more than style?
      options:
        - None
        - Legal
        - Medical
        - Financial
        - Academic
        - Employment
        - Technical
        - Other factual claim
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source text
      description: Paste tool-redacted public text. Keep enough texture to reproduce the failure.
      placeholder: Paste the messy draft, note, or prose sample here.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Youish output
      description: Paste the tool-redacted output that failed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Youish have preserved, changed, avoided, or inferred? Tool-redacted desired rewrites are ideal.
    validations:
      required: true
  - type: textarea
    id: protected
    attributes:
      label: Protected facts or constraints
      description: Names, dates, numbers, claims, quotes, word counts, no-dash rules, or other facts that must not change.
  - type: textarea
    id: voice
    attributes:
      label: Voice markers
      description: Phrases, rhythm, tone, jokes, stance, rough edges, or emotional temperature that should survive.
  - type: textarea
    id: profile_boundary
    attributes:
      label: Profile boundary
      description: Should this become reusable profile guidance? When should this voice or habit not apply?
      placeholder: Example: Dry Slack voice is good for internal notes. Do not apply dry Slack voice to legal/customer notices.
  - type: textarea
    id: boundary
    attributes:
      label: Boundary fence
      description: Any explicit "do not apply this phrase/style here" or "do not use this phrase in this context" rule. Name the phrase/style directly so the audit can catch it.
      placeholder: 'Example: [[boundary: do not use "haunted changelog" in customer notices]]'
  - type: textarea
    id: audit_json
    attributes:
      label: Audit or fixture JSON
      description: Paste output from `python3 scripts/audit.py --json` or `python3 scripts/failure_fixture.py --json` if available.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, API keys, customer data, and private drafts that should not be public.
          required: true
